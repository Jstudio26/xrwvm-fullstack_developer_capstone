name: 'Lint Code'

on:
  push:
    branches:
      - master
      - main

  pull_request:
    branches:
      - master
      - main

jobs:
  lint_python:
    name: Lint Python Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run Python Linter
        run: |
          find . -name "*.py" -exec flake8 \
            --max-line-length=300 \
            --ignore=E302,E128,E231,E501,E225,E722,E275,E305,E402,E712,E124,F401,F841,E226,E121 \
            '{}' +
          echo "Python lint completed successfully"

  lint_js:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '14'

      - name: Install JSHint
        run: npm install -g jshint

      - name: Create JSHint configuration
        run: |
          cat <<EOF > .jshintrc
          {
            "esversion": 8,
            "asi": true,
            "sub": true
          }
          EOF

      - name: Run JavaScript Linter
        run: |
          find ./server/database \
            -name "*.js" \
            -not -path "*/node_modules/*" \
            -exec jshint '{}' +
          echo "JavaScript lint completed successfully"
